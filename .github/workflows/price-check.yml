name: Price Check

on:
  schedule:
    # Summer (BST = UTC+1)
    - cron: '15 5 * * *'    # 06:15 BST
    - cron: '15 11 * * *'   # 12:15 BST
    - cron: '15 17 * * *'   # 18:15 BST
    - cron: '15 23 * * *'   # 00:15 BST

    # Winter (GMT = UTC)
    - cron: '15 6 * * *'    # 06:15 GMT
    - cron: '15 12 * * *'   # 12:15 GMT
    - cron: '15 18 * * *'   # 18:15 GMT
    - cron: '15 0 * * *'    # 00:15 GMT

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current time
        run: |
          echo "UTC Time:"
          date -u
          echo "Local Time:"
          date

      - name: Fetch prices and update history
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: node .github/workflows/sync.js

      - name: Commit updated history
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@thewoolroom.com"

          git add price-history.json

          git diff --staged --quiet || git commit -m "Price sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          git push
