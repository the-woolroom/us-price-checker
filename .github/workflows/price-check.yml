name: Price Check

on:
  schedule:
    - cron: '15 0,6,12,18 * * *'   # winter UK = 00:15, 06:15, 12:15, 18:15
    - cron: '15 5,11,17,23 * * *'  # summer UK = 06:15, 12:15, 18:15, 00:15 BST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prices and update history
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: node .github/workflows/sync.js

      - name: Commit updated history
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@thewoolroom.com"
          git add price-history.json
          git diff --staged --quiet || git commit -m "Price sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
